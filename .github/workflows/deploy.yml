name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            PROJECT_DIR="/root/danang-badminton-hub"

            # Clone on first deploy, pull on subsequent
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📦 First deploy — cloning repo..."
              git clone https://github.com/khanhduong22/danang-badminton-hub.git "$PROJECT_DIR"
            else
              echo "🔄 Pulling latest code..."
              cd "$PROJECT_DIR"
              git pull origin main
            fi

            cd "$PROJECT_DIR"

            # Write .env from GitHub Secrets
            cat > deploy/.env << EOF
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            FB_EMAIL=${{ secrets.FB_EMAIL }}
            FB_PASSWORD=${{ secrets.FB_PASSWORD }}
            FB_COOKIE=${{ secrets.FB_COOKIE }}
            FB_GROUP_IDS=${{ secrets.FB_GROUP_IDS }}
            EOF

            # Install Playwright Chromium in backend if needed
            cd deploy

            # Build & restart backend only (preserve DB + Meilisearch data)
            docker compose build backend
            docker compose up -d

            # Wait for backend to be healthy
            echo "⏳ Waiting for backend..."
            sleep 8
            docker compose ps
            docker compose logs backend --tail=30

            echo "✅ Deploy complete!"

      - name: Install otel-cli
        if: always()
        run: curl -sL https://github.com/equinix-labs/otel-cli/releases/download/v0.4.4/otel-cli_0.4.4_linux_amd64.tar.gz | tar xz otel-cli

      - name: Send Trace to SigNoz
        if: always()
        run: |
          STATUS_CODE=$([ "${{ job.status }}" = "success" ] && echo 0 || echo 2)
          # Use specific tags (repository.name) expected by SigNoz CI/CD Dashboard
          ./otel-cli span --service "github-actions" --name "Deploy Badminton Hub" \
            --attrs "job.status=${{ job.status }},repository.name=${{ github.repository }},github.run_id=${{ github.run_id }}" \
            --endpoint "https://otel.khanhdp.com" \
            --protocol "http/protobuf" \
            --status-code "$STATUS_CODE" \
            --otlp-headers "Authorization=Bearer kido_super_secret_token_2026"

version: '3.8'

services:
  db:
    image: postgres:15
    container_name: badminton_db
    environment:
      POSTGRES_DB: badminton_hub
      POSTGRES_USER: superadmin
      POSTGRES_PASSWORD: supersecretpassword123
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:latest
    container_name: badminton_api
    environment:
      PGRST_DB_URI: postgres://superadmin:supersecretpassword123@db:5432/badminton_hub
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

  crawler:
    build: ./crawler
    container_name: badminton_crawler
    environment:
      POSTGREST_URL: http://postgrest:3000
    depends_on:
      - postgrest
    restart: unless-stopped
    # Use standard host mapping for puppeteer inner sandbox capabilities if needed
    # network_mode: "host"

volumes:
  db-data:

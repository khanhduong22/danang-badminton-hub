version: "3.8"

services:
  db:
    image: postgres:17
    container_name: badminton_db
    environment:
      POSTGRES_DB: badminton_hub
      POSTGRES_USER: superadmin
      POSTGRES_PASSWORD: supersecretpassword123
    ports:
      - "5444:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: badminton_meilisearch
    environment:
      - MEILI_MASTER_KEY=supersecretmeilisearchkey
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ../backend
    container_name: badminton_backend
    environment:
      - DATABASE_URL=postgresql://superadmin:supersecretpassword123@db:5432/badminton_hub?schema=public
      - MEILI_HOST=http://badminton_meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-supersecretmeilisearchkey}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FB_EMAIL=${FB_EMAIL}
      - FB_PASSWORD=${FB_PASSWORD}
      - FB_COOKIE=${FB_COOKIE}
      - FB_GROUP_IDS=${FB_GROUP_IDS:-594956003862912}
      - APIFY_PROXY_PASSWORD=${APIFY_PROXY_PASSWORD}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://172.17.0.1:4318
    ports:
      - "3001:3001"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      # Persist FB session cookies across container restarts
      - backend-storage:/usr/src/app/storage
    command: >
      sh -c "npx prisma db push && npm run start:prod"

volumes:
  db-data:
  meili-data:
  backend-storage:
